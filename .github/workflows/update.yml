name: Update Ulasan Playstore

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
           pip install google-play-scraper pandas scikit-learn joblib Sastrawi

      - name: Scraping Playstore
        run: python ambil_ulasan.py

      - name: Preprocessing dan Prediksi
        run: python preprocessing.py

      - name: Commit & Push hasil
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data"
          else
            git commit -m "Update data ulasan otomatis"
            git push
            echo "Data berhasil diperbarui dan di-push"
          fi
