name: Update Ulasan Playstore

on:
  schedule:
    - cron: '0 18 * * *'   # 01:00 WIB
  workflow_dispatch:

permissions:
  contents: write   # ← WAJIB agar bisa push

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install library
        run: pip install google-play-scraper pandas

      - name: Run script
        run: python ambil_ulasan.py

      - name: Commit & Push hasil
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Update ulasan otomatis"
          
          # Ambil perubahan terbaru dulu
          git pull origin main --rebase
          
          git push origin main
